<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Metrix | Intelligence Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 antialiased font-sans">

    <nav class="bg-white border-b border-slate-200 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <span class="text-2xl font-bold text-slate-900">Solar<span class="text-blue-600">Metrix</span></span>
            <a href="/" class="text-slate-500 hover:text-blue-600 font-medium">Back to Main App</a>
        </div>
    </nav>

    <header class="max-w-5xl mx-auto px-6 py-16">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4">Engineering Intelligence</h1>
        <p class="text-xl text-slate-600 max-w-2xl">Automated technical analysis, weather-based yield reports, and dynamic soiling breakdowns.</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-24">
        
        <div id="loading" class="text-center text-slate-400 py-10">
            <svg class="animate-spin h-8 w-8 mx-auto text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>Fetching latest reports...</p>
        </div>

        <div id="blog-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>

    </main>

    <script>
        async function loadBlogFeed() {
            // 1. Ask the GitHub API what files are in your posts folder
            const repoUrl = 'https://api.github.com/repos/farhankhalil217-ux/blogpagetest/contents/posts';
            const feedContainer = document.getElementById('blog-feed');
            const loadingDiv = document.getElementById('loading');

            try {
                const response = await fetch(repoUrl);
                if (!response.ok) throw new Error("Could not connect to repository.");
                const files = await response.json();

                // 2. Hide loading spinner, show the grid
                loadingDiv.classList.add('hidden');
                feedContainer.classList.remove('hidden');

                // 3. Filter for Markdown files and reverse the list so newest is first
                const mdFiles = files.filter(file => file.name.endsWith('.md')).reverse();

                mdFiles.forEach(file => {
                    // 4. Decode the filename (e.g., 1_cluster_1710500000_part_1.md)
                    const parts = file.name.replace('.md', '').split('_');
                    const isUrgent = parts[0] === '0';
                    
                    // Convert the UNIX timestamp (parts[2]) into a readable date
                    let publishDate = "Recent";
                    if (parts[2] && !isNaN(parts[2])) {
                        publishDate = new Date(parseInt(parts[2]) * 1000).toLocaleDateString('en-US', { 
                            month: 'long', day: 'numeric', year: 'numeric' 
                        });
                    }

                    // Extract the part number
                    const partNumber = parts[4] || '1';

                    // 5. Build the HTML Card
                    const card = `
                        <a href="post.html?file=${file.name}" class="flex flex-col p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-lg hover:border-blue-300 transition-all duration-200 cursor-pointer group">
                            <div class="mb-4">
                                ${isUrgent 
                                    ? '<span class="inline-block px-3 py-1 text-xs font-bold text-red-700 bg-red-100 rounded-full">Priority Override</span>' 
                                    : '<span class="inline-block px-3 py-1 text-xs font-bold text-blue-700 bg-blue-100 rounded-full">Engineering Analysis</span>'}
                            </div>
                            <h2 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-blue-600 transition-colors">
                                Technical Report: Sequence ${partNumber}
                            </h2>
                            <p class="text-slate-500 text-sm mb-6 flex-grow">
                                Published on ${publishDate}
                            </p>
                            <div class="text-blue-600 font-medium flex items-center">
                                Read full analysis 
                                <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </div>
                        </a>
                    `;
                    
                    // 6. Inject the card into the grid
                    feedContainer.innerHTML += card;
                });

                // If the folder is empty
                if (mdFiles.length === 0) {
                    feedContainer.innerHTML = "<p class='text-slate-500 col-span-full'>No reports have been published yet.</p>";
                    feedContainer.classList.remove('grid');
                }

            } catch (error) {
                loadingDiv.innerHTML = "<p class='text-red-500'>Error loading the intelligence feed.</p>";
                console.error(error);
            }
        }

        // Trigger the function when the page loads
        loadBlogFeed();
    </script>
</body>
</html>
