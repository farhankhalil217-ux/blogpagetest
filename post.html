<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Metrix | Engineering Blog</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-xl font-bold text-slate-900">
                <i data-lucide="sun" class="w-6 h-6 text-sky-500"></i>
                Solar<span class="text-sky-600">Metrix</span>
            </a>
            <a href="/" class="text-sm font-medium text-slate-500 hover:text-sky-600 transition-colors">Back to Main App</a>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto px-6 py-12 w-full">
        
        <div id="loading" class="text-center text-slate-400 py-20">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto text-sky-500 mb-4"></i>
            <p id="loading-text">Loading intelligence feed...</p>
        </div>

        <div id="feed-view" class="hidden">
            <header class="mb-12">
                <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Engineering Intelligence</h1>
                <p class="text-lg text-slate-600">Automated technical analysis, weather-based yield reports, and dynamic soiling breakdowns.</p>
            </header>
            
            <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>

        <div id="reader-view" class="hidden max-w-3xl mx-auto">
            <a href="post.html" class="inline-flex items-center text-sm font-medium text-sky-600 hover:text-sky-700 mb-8 group">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform"></i>
                Back to all articles
            </a>
            
            <article id="blog-content" class="prose prose-slate lg:prose-lg mx-auto w-full"></article>
        </div>

    </main>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center text-sm mt-auto">
        <p>&copy; 2024 Solar Metrix. Automated Engineering Insights.</p>
    </footer>

    <script>
        lucide.createIcons();

        // Check the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const feedView = document.getElementById('feed-view');
        const readerView = document.getElementById('reader-view');
        const blogGrid = document.getElementById('blog-grid');
        const blogContent = document.getElementById('blog-content');

        // ROUTER LOGIC
        if (fileName) {
            // ROUTE: Render Specific Article
            loadingText.innerText = "Loading technical analysis...";
            
            fetch(`/posts/${fileName}`)
                .then(response => {
                    if (!response.ok) throw new Error("Article not found.");
                    return response.text();
                })
                .then(markdownText => {
                    blogContent.innerHTML = marked.parse(markdownText);
                    loadingDiv.classList.add('hidden');
                    readerView.classList.remove('hidden');
                })
                .catch(error => {
                    loadingDiv.innerHTML = `<p class="text-red-500 font-medium">Sorry, this article could not be loaded.</p><a href="post.html" class="text-sky-600 mt-4 inline-block">Return to Feed</a>`;
                    console.error(error);
                });

        } else {
            // ROUTE: Render The Feed via GitHub API
            loadingText.innerText = "Fetching latest reports...";
            const repoUrl = 'https://api.github.com/repos/farhankhalil217-ux/blogpagetest/contents/posts';

            fetch(repoUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Could not connect to repository.");
                    return response.json();
                })
                .then(files => {
                    loadingDiv.classList.add('hidden');
                    feedView.classList.remove('hidden');

                    const mdFiles = files.filter(file => file.name.endsWith('.md')).reverse();

                    if (mdFiles.length === 0) {
                        blogGrid.innerHTML = "<p class='text-slate-500 col-span-full'>No reports have been published yet.</p>";
                        blogGrid.classList.remove('grid');
                        return;
                    }

                    mdFiles.forEach(file => {
                        const parts = file.name.replace('.md', '').split('_');
                        const isUrgent = parts[0] === '0';
                        const partNumber = parts[4] || '1';
                        
                        let publishDate = "Recent";
                        if (parts[2] && !isNaN(parts[2])) {
                            publishDate = new Date(parseInt(parts[2]) * 1000).toLocaleDateString('en-US', { 
                                month: 'short', day: 'numeric', year: 'numeric' 
                            });
                        }

                        const card = `
                            <a href="post.html?file=${file.name}" class="flex flex-col p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-lg hover:border-sky-300 transition-all duration-200 cursor-pointer group">
                                <div class="mb-4">
                                    ${isUrgent 
                                        ? '<span class="inline-block px-3 py-1 text-xs font-bold text-red-700 bg-red-100 rounded-full">Priority Override</span>' 
                                        : '<span class="inline-block px-3 py-1 text-xs font-bold text-sky-700 bg-sky-100 rounded-full">Engineering Analysis</span>'}
                                </div>
                                <h2 class="text-xl font-bold text-slate-900 mb-3 group-hover:text-sky-600 transition-colors">
                                    Technical Report: Sequence ${partNumber}
                                </h2>
                                <p class="text-slate-500 text-sm mb-6 flex-grow">
                                    Published on ${publishDate}
                                </p>
                                <div class="text-sky-600 font-medium flex items-center text-sm">
                                    Read full analysis 
                                    <i data-lucide="arrow-right" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
                                </div>
                            </a>
                        `;
                        blogGrid.innerHTML += card;
                    });
                    
                    // Re-initialize icons for the new cards
                    lucide.createIcons();
                })
                .catch(error => {
                    loadingDiv.innerHTML = "<p class='text-red-500 font-medium'>Error loading the intelligence feed.</p>";
                    console.error(error);
                });
        }
    </script>
</body>
</html>
